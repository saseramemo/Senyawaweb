<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Halaman Tidak Ditemukan - Senyawa Project</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
            color: #f0f0f0;
            min-height: 100vh;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Poppins:wght@400;500;600;700;800&display=swap');

        :root {
            --senyawa: #670C1F;
            --senyawa-dark: #4a0715;
        }

        /* tombol kembali ke beranda di pojok kiri atas */
        .back-home {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 100;
        }

        .back-home a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(103, 12, 31, 0.9);
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 200, 200, 0.3);
            backdrop-filter: blur(8px);
        }

        .back-home a:hover {
            background: #4a0715;
            transform: translateX(-3px);
        }

        .back-home a i {
            font-size: 0.9rem;
        }

        /* container utama */
        .error-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            background: radial-gradient(circle at 30% 10%, #1a0a0e, #020202 85%);
            position: relative;
        }

        /* konten utama */
        .error-content {
            text-align: center;
            max-width: 700px;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* angka 404 */
        .error-code {
            font-size: 12rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #670C1F 0%, #9e1a32 50%, #670C1F 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(103,12,31,0.5);
            letter-spacing: 20px;
            margin-bottom: 1rem;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 2px 0 rgba(255,0,0,0.2), -2px 0 rgba(0,0,255,0.2); }
            25% { text-shadow: -2px 0 rgba(255,0,0,0.2), 2px 0 rgba(0,0,255,0.2); }
            50% { text-shadow: 2px 0 rgba(255,0,0,0.2), -2px 0 rgba(0,0,255,0.2); }
            75% { text-shadow: -2px 0 rgba(255,0,0,0.2), 2px 0 rgba(0,0,255,0.2); }
        }

        .error-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #fff;
        }

        .error-message {
            font-size: 1.1rem;
            color: #ccc;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        /* saran pencarian */
        .suggestions {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #222;
        }

        .suggestions h3 {
            font-size: 1rem;
            font-weight: 500;
            color: #aaa;
            margin-bottom: 1rem;
        }

        .suggestions-links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .suggestions-links a {
            color: #ddd;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .suggestions-links a:hover {
            color: #e0a0a0;
        }

        /* responsive */
        @media (max-width: 768px) {
            .back-home {
                top: 20px;
                left: 20px;
            }
            .back-home a {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
            .error-code {
                font-size: 5rem;
                letter-spacing: 10px;
            }
            .error-title {
                font-size: 1.3rem;
            }
            .error-message {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- Tombol Kembali ke Beranda di pojok kiri atas -->
    <div class="back-home">
        <a href="index.html">
            <i class="fas fa-arrow-left"></i>
            <span>Kembali ke Beranda</span>
        </a>
    </div>

    <div class="error-container">
        <div class="error-content">
            <!-- angka 404 -->
            <div class="error-code">404</div>
            
            <!-- pesan error -->
            <div class="error-title">Oops! Halaman Tidak Ditemukan</div>
            
            <div class="error-message">
                Maaf, halaman yang Anda cari tidak dapat ditemukan.<br>
                Mungkin halaman tersebut telah dipindahkan atau dihapus.
            </div>

            <!-- saran halaman yang mungkin dicari -->
            <div class="suggestions">
                <h3>Anda mungkin mencari:</h3>
                <div class="suggestions-links">
                    <a href="index.html">Beranda</a>
                    <a href="index.html#members">Member</a>
                    <a href="index.html#about">About Us</a>
                    <a href="project.html">Project</a>
                    <a href="store.html">Store</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
