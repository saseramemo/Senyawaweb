<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Tersesat di Senyawa</title>
    <style>
        body {
            background-color: #0f0f0f; /* Warna gelap khas gaming */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        h1 {
            font-size: 8rem;
            margin: 0;
            background: linear-gradient(45deg, #ff4e50, #f9d423);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            color: #ccc;
        }

        .btn-back {
            margin-top: 30px;
            padding: 12px 25px;
            background-color: #e63946;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn-back:hover {
            background-color: #b91c1c;
            transform: scale(1.05);
        }

        .mc-text {
            font-family: monospace;
            color: #55ff55; /* Warna hijau khas Minecraft */
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Waduh! Kamu tersesat.</h2>
        <p>Halaman yang kamu cari tidak ditemukan atau folder ini bersifat rahasia.</p>
        <p class="mc-text">> Player was slain by Unknown Directory</p>
        <br><br>
        <a href="/Senyawaweb/" class="btn-back">Kembali ke Base</a>
    </div>
</body>
</html>
