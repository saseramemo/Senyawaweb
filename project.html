    <style>
        /* Gaya khusus untuk halaman ini */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
            color: #f0f0f0;
        }

        /* header halaman */
        .page-header {
            padding-top: 120px;
            padding-bottom: 60px;
            background: radial-gradient(circle at 30% 10%, #1a0a0e, #020202 85%);
            border-bottom: 1px solid #1f1f1f;
        }

        .page-header h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .page-header h1:after {
            content: '';
            display: block;
            width: 80px;
            height: 4px;
            background: var(--senyawa);
            margin-top: 12px;
            border-radius: 4px;
        }

        .page-header p {
            font-size: 1.2rem;
            color: #ccc;
            max-width: 700px;
        }

        /* filter tabs */
        .filter-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 2rem 0 2rem 0;
            padding-bottom: 1rem;
            border-bottom: 1px solid #222;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid #333;
            color: #ddd;
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .filter-btn:hover {
            border-color: var(--senyawa);
            color: #fff;
        }

        .filter-btn.active {
            background: var(--senyawa);
            border-color: var(--senyawa);
            color: white;
        }

        /* projects grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 2rem;
            margin: 2rem 0 3rem;
        }

        .project-card {
            background: #0c0c0c;
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid #222;
            animation: fadeInUp 0.5s ease;
        }

        .project-card:hover {
            transform: translateY(-8px);
            border-color: var(--senyawa);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.5);
        }

        .project-card .yt-lazy-facade {
            border: none;
            border-radius: 0;
            border-bottom: 1px solid #222;
        }

        .project-info {
            padding: 1.2rem;
        }

        .project-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .project-category {
            font-size: 0.8rem;
            color: var(--senyawa);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .project-desc {
            font-size: 0.85rem;
            color: #aaa;
            line-height: 1.4;
        }

        /* back button */
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(103, 12, 31, 0.2);
            border: 1px solid var(--senyawa);
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 2rem;
            transition: 0.2s;
        }

        .back-button:hover {
            background: var(--senyawa);
            transform: translateX(-5px);
        }

        /* responsive */
        @media (max-width: 880px) {
            .container {
                padding: 0 24px;
            }

            .page-header h1 {
                font-size: 2.2rem;
            }

            .projects-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }

        function renderProjects(category = "all") {
            const container = document.getElementById("projectsGrid");
            if (!container) return;

            let filteredProjects = projectsData;
            if (category !== "all") {
                filteredProjects = projectsData.filter(project => project.category === category);
            }

            if (filteredProjects.length === 0) {
                container.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; background: #111; border-radius: 24px;">
                <i class="fas fa-folder-open" style="font-size: 3rem; color: #670C1F; margin-bottom: 1rem; display: block;"></i>
                <h3>Belum ada project di kategori ini</h3>
                <p style="color: #aaa; margin-top: 0.5rem;">Project lainnya akan segera hadir!</p>
            </div>
        `;
                return;
            }

            container.innerHTML = "";
            filteredProjects.forEach(project => {
                const categoryName = getCategoryName(project.category);

                const thumbUrl = project.thumb || '';

                const card = document.createElement("div");
                card.className = "project-card";
                card.innerHTML = `

        // Script Click-to-Play Facade (Tidak perlu diubah, sudah sangat bagus!)
        function setupYoutubeFacades() {
            const ytFacades = document.querySelectorAll(".yt-lazy-facade");
            // Gunakan async untuk menunggu hasil fetch dari oEmbed
            ytFacades.forEach(async (facade) => {
                let thumbUrl = facade.getAttribute("data-thumb");
                const playlistId = facade.getAttribute("data-playlist");

                // Otomatis tarik gambar dari oEmbed jika url masih kosong/menggunakan placeholder
                if (!thumbUrl || thumbUrl.includes("ID_VIDEO_PERTAMA")) {
                    try {
                        const playlistUrl = `https://www.youtube.com/playlist?list=${playlistId}`;
                        // Mengambil URL fetch dari konstanta VIDEO_OEMBED_ENDPOINTS
                        const endpoint = VIDEO_OEMBED_ENDPOINTS.youtube(playlistUrl);
                        const res = await fetch(endpoint);
                        const data = await res.json();
                        if (data && data.thumbnail_url) {
                            thumbUrl = data.thumbnail_url;
                        }
                    } catch (e) {
                        console.error("Gagal mengambil thumbnail otomatis", e);
                    }
                }

                // Pengecekan thumbUrl dipertajam agar tidak pasang URL kosong/invalid
                if (thumbUrl && thumbUrl.trim() !== "" && !thumbUrl.includes("ID_VIDEO_PERTAMA")) {
                    facade.style.backgroundImage = `url('${thumbUrl}')`;
                } else {
                    // Fallback elegan jika gambar gagal/tidak disediakan
                    facade.style.background = "linear-gradient(135deg, #111, #1a1a1a)";
                }

                facade.addEventListener("click", () => {
                    // Ganti isi facade dengan animasi loading (spinner)
                    facade.innerHTML = '<div class="loader-spinner" style="position: absolute; top: 50%; left: 50%; margin-top: -18px; margin-left: -18px; z-index: 1;"></div>';

                    // Coba ekstrak Video ID dari URL thumbnail yang didapat oEmbed
                    let videoId = "";
                    if (thumbUrl && thumbUrl.includes("/vi/")) {
                        videoId = thumbUrl.split("/vi/")[1].split("/")[0];
                    }

                    const iframe = document.createElement("iframe");
                    if (videoId) {
                        iframe.setAttribute("src", `https://www.youtube.com/embed/${videoId}?feature=oembed&autoplay=1`);
                    } else {
                        iframe.setAttribute("src", `https://www.youtube.com/embed/videoseries?list=${playlistId}&autoplay=1&rel=0`);
                    }
                    iframe.setAttribute("frameborder", "0");
                    iframe.setAttribute("allow", "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture");
                    iframe.setAttribute("allowfullscreen", "true");

                    // Sembunyikan iframe sementara sampai selesai loading
                    iframe.style.opacity = "0";
                    iframe.style.transition = "opacity 0.4s ease";

                    iframe.onload = () => {
                        iframe.style.opacity = "1"; // Munculkan iframe perlahan
                        const spinner = facade.querySelector('.loader-spinner');
                        if (spinner) spinner.remove(); // Hapus spinner
                    };

                    facade.appendChild(iframe);
                    facade.style.cursor = "default";
                }, { once: true });
            });
        }

        function getCategoryName(category) {
            const categories = {
                "series": "SERIES",
                "event": "EVENT",
                "collab": "COLLAB"
            };
            return categories[category] || "📺 PROJECT";
        }

        // Setup filter tabs
        function setupFilters() {
            const filterBtns = document.querySelectorAll(".filter-btn");
            filterBtns.forEach(btn => {
                btn.addEventListener("click", () => {
                    // Update active class
                    filterBtns.forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");

                    // Filter projects
                    const category = btn.getAttribute("data-category");
                    renderProjects(category);

                    // Scroll sedikit ke atas setelah filter
                    setTimeout(() => {
                        const projectsSection = document.querySelector(".projects-grid");
                        if (projectsSection) {
                            projectsSection.scrollIntoView({ behavior: "smooth", block: "start" });
                        }
                    }, 100);
                });
            });
        }

            // Tutup nav saat link diklik
            document.querySelectorAll(".nav-links a").forEach(link => {
                link.addEventListener("click", () => {
                    navLinks.classList.remove("active");
                    if (menuToggle) menuToggle.classList.remove("active");
                });
            });
        }

        // ==========================================
        // SCRIPT VIDEO THUMBNAIL PREVIEW 
        // ==========================================
        const VIDEO_OEMBED_ENDPOINTS = {
            youtube: (url) => `https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`,
            vimeo: (url) => `https://vimeo.com/api/oembed.json?url=${encodeURIComponent(url)}`,
            wistia: (url) => `https://fast.wistia.com/oembed?url=${encodeURIComponent(url)}&format=json`
        };

        class VideoThumbnailPreview {
            constructor(container) {
                this.container = container;
                this.input = container.querySelector('.video-input');
                this.thumbnailOutput = container.querySelector('.video-thumbnail-output');
                this.dataOutput = container.querySelector('.video-data-output');
                this.urlOutput = container.querySelector('.video-url-output');

                this.dataTitleOutput = container.querySelector('.video-data-title-output');
                this.dataHtmlOutput = container.querySelector('.video-data-html-output');
                this.dataHtmlRawOutput = container.querySelector('.video-data-html-raw-output');

                // Bind event listeners
                this.input.addEventListener('input', () => this.fetchThumbnail());

                // Initial fetch if there's a value
                this.fetchThumbnail();
            }

            async fetchThumbnail() {
                const url = this.input.value;
                if (!url) {
                    this.clearOutput();
                    return;
                }

                const videoProvider = this.detectVideoProvider(url);
                if (!videoProvider) {
                    this.clearOutput();
                    return;
                }

                try {
                    const data = await this.fetchOembedData(url, videoProvider);
                    if (data) {
                        this.thumbnailOutput.innerHTML = `
                            <figure>
                                <img src="${data.thumbnail_url}" alt="${data.title}">
                                <figcaption>${data.thumbnail_url}</figcaption>
                            </figure>`;
                        this.dataOutput.textContent = JSON.stringify(data, null, 2);
                        this.urlOutput.textContent = VIDEO_OEMBED_ENDPOINTSvideoProvider;

                        this.dataTitleOutput.textContent = data.title;
                        this.dataHtmlOutput.innerHTML = data.html;
                        this.dataHtmlRawOutput.textContent = data.html.replace(/\\"/g, '"');
                    } else {
                        this.clearOutput();
                    }
                } catch (error) {
                    console.error('Error fetching thumbnail:', error);
                    this.clearOutput();
                }
            }

            clearOutput() {
                this.thumbnailOutput.innerHTML = '';
                this.dataOutput.innerHTML = '';
                this.urlOutput.textContent = '';
                this.dataTitleOutput.textContent = '';
                this.dataHtmlOutput.innerHTML = '';
                this.dataHtmlRawOutput.textContent = '';
            }

            detectVideoProvider(url) {
                if (url.match(/youtu/)) return 'youtube';
                if (url.match(/vimeo/)) return 'vimeo';
                if (url.match(/wistia/)) return 'wistia';
                return null;
            }

            async fetchOembedData(url, provider) {
                const endpointGenerator = VIDEO_OEMBED_ENDPOINTS[provider];
                if (!endpointGenerator) return null;

                const endpoint = endpointGenerator(url);
                const response = await fetch(endpoint);
                if (!response.ok) return null;

                const data = await response.json();
                return data;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('video-preview-container');
            // Cek apakah elemen ada di halaman agar tidak terjadi error "null is not an object"
            if (container) {
                window.videoPreview = new VideoThumbnailPreview(container);
            }
        });
    </script>
</body>

</html>
